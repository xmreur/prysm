name: Build PR

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.issue.number }}

jobs:
  authorize:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == 'build:test' }}
    runs-on: ubuntu-latest
    outputs:
      is_codeowner: ${{ steps.verify.outputs.is_codeowner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commenter is listed in CODEOWNERS
        id: verify
        shell: bash
        run: |
          COMMENTER="${{ github.actor }}"

          if [ -f "CODEOWNERS" ]; then
            CODEOWNERS_FILE="CODEOWNERS"
          elif [ -f ".github/CODEOWNERS" ]; then
            CODEOWNERS_FILE=".github/CODEOWNERS"
          elif [ -f "docs/CODEOWNERS" ]; then
            CODEOWNERS_FILE="docs/CODEOWNERS"
          else
            echo "is_codeowner=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if grep -Eq "(^|[[:space:]])@${COMMENTER}([[:space:]]|$)" "$CODEOWNERS_FILE"; then
            echo "is_codeowner=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_codeowner=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: React to trigger comment
        if: steps.verify.outputs.is_codeowner == 'true'
        shell: bash
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ secrets.PR_BOT_TOKEN }}

  build-windows:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: windows-latest
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: |
          flutter config --enable-windows-desktop
          flutter pub get

      - name: Patch opus_flutter_windows
        run: |
          $symlink = "windows/flutter/ephemeral/.plugin_symlinks/opus_flutter_windows/windows"
          if (-not (Test-Path $symlink)) { New-Item -ItemType Directory -Path $symlink -Force }

      - run: flutter build windows --release
        env:
          CMAKE_POLICY_VERSION_MINIMUM: 3.5

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-windows-build
          path: build/windows/x64/runner/Release/

  build-linux:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: ubuntu-latest
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            libopus0 \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libpulse-dev

      - run: |
          flutter config --enable-linux-desktop
          flutter pub get

      - run: flutter build linux --release

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-linux-build
          path: build/linux/x64/release/bundle/

  build-macos:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: macos-latest
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install macOS dependencies
        run: |
          brew install cocoapods opus
          brew link --overwrite cocoapods

      - run: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Pod install
        working-directory: macos
        run: pod install

      - run: flutter build macos --release

      - name: Package .app as zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r prysm-macos.zip prysm.app

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-macos-build
          path: build/macos/Build/Products/Release/prysm-macos.zip

  build-ios:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: macos-latest
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install iOS dependencies
        run: |
          brew install cocoapods
          brew link --overwrite cocoapods

      - run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install

      - run: flutter build ios --release --no-codesign

      - name: Package .app as zip
        run: |
          cd build/ios/iphoneos
          zip -r prysm-ios.zip Runner.app

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-ios-build
          path: build/ios/iphoneos/prysm-ios.zip

  build-android:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: ubuntu-latest
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: flutter pub get

      - run: flutter build apk --release

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  report:
    needs:
      - authorize
      - build-windows
      - build-linux
      - build-macos
      - build-ios
      - build-android
    if: always() && needs.authorize.outputs.is_codeowner == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR comment body
        id: body
        shell: bash
        run: |
          {
            echo 'comment<<EOF'
            echo '## PR build results'
            echo ''
            echo '| Platform | Result | Artifact |'
            echo '|---|---|---|'
            echo '| Windows | ${{ needs.build-windows.result }} | [Download](${{ needs.build-windows.outputs.artifact_url }}) |'
            echo '| Linux | ${{ needs.build-linux.result }} | [Download](${{ needs.build-linux.outputs.artifact_url }}) |'
            echo '| macOS | ${{ needs.build-macos.result }} | [Download](${{ needs.build-macos.outputs.artifact_url }}) |'
            echo '| iOS | ${{ needs.build-ios.result }} | [Download](${{ needs.build-ios.outputs.artifact_url }}) |'
            echo '| Android | ${{ needs.build-android.result }} | [Download](${{ needs.build-android.outputs.artifact_url }}) |'
            echo ''
            echo "Triggered by: @${{ github.actor }}"
            echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        run: |
          gh issue comment "${{ env.PR_NUMBER }}" --body "${{ steps.body.outputs.comment }}"
        env:
          GH_TOKEN: ${{ secrets.PR_BOT_TOKEN }}