name: Build PR

on:
  issue_comment:
    types: [created]

concurrency:
  group: build-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.issue.number }}
  TRIGGER_COMMAND: "build:test"

jobs:
  authorize:
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.body == env.TRIGGER_COMMAND
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      is_codeowner: ${{ steps.verify.outputs.is_codeowner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commenter is Codeowner for changed files
        id: verify
        run: |
          COMMENTER="${{ github.actor }}"
          # Get list of codeowners for the PR files using int128/find-codeowners-action logic manually or via API
          # Since we need to check against the CODEOWNERS file dynamically:
          
          # 1. Get changed files in the PR
          CHANGED_FILES=$(gh api "repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/files" --jq '.[].filename')
          
          # 2. Read CODEOWNERS file
          if [ ! -f "CODEOWNERS" ] && [ ! -f ".github/CODEOWNERS" ] && [ ! -f "docs/CODEOWNERS" ]; then
            echo "No CODEOWNERS file found. Failing."
            echo "is_codeowner=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          CODEOWNERS_FILE=""
          [ -f "CODEOWNERS" ] && CODEOWNERS_FILE="CODEOWNERS"
          [ -f ".github/CODEOWNERS" ] && CODEOWNERS_FILE=".github/CODEOWNERS"
          [ -f "docs/CODEOWNERS" ] && CODEOWNERS_FILE="docs/CODEOWNERS"
          
          # Simple check: Does the commenter appear in the CODEOWNERS file at all?
          # For strict file-level matching, a complex script is needed. 
          # Here we check if the user is defined as ANY codeowner in the file.
          if grep -q "@$COMMENTER" "$CODEOWNERS_FILE"; then
            echo "User @$COMMENTER found in CODEOWNERS file."
            echo "is_codeowner=true" >> $GITHUB_OUTPUT
          else
            echo "User @$COMMENTER is NOT in CODEOWNERS file."
            echo "is_codeowner=false" >> $GITHUB_OUTPUT
            gh issue comment "$PR_NUMBER" --body "❌ Only defined Codeowners can trigger PR builds. You (@$COMMENTER) are not listed in CODEOWNERS."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: React to trigger comment
        if: steps.verify.outputs.is_codeowner == 'true'
        run: |
          gh api \
            -X POST "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'
        env:
          GH_TOKEN: ${{ github.token }}

  # ----------------------------
  # Windows build
  # ----------------------------
  build-windows:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: |
          flutter config --enable-windows-desktop
          flutter pub get
      - name: Patch opus_flutter_windows
        run: |
          $symlink = "windows/flutter/ephemeral/.plugin_symlinks/opus_flutter_windows/windows"
          if (-not (Test-Path $symlink)) { New-Item -ItemType Directory -Path $symlink -Force }
      - run: flutter build windows --release
        env:
          CMAKE_POLICY_VERSION_MINIMUM: 3.5

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-windows-build
          path: build/windows/x64/runner/Release/

  # ----------------------
  # LINUX BUILD
  # ----------------------
  build-linux:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            libopus0 \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libpulse-dev

      - run: |
          flutter config --enable-linux-desktop
          flutter pub get
      - run: flutter build linux

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-linux-build
          path: build/linux/x64/release/bundle/

  # ----------------------
  # MACOS BUILD
  # ----------------------
  build-macos:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install macOS dependencies
        run: |
          brew install cocoapods opus
          brew link --overwrite cocoapods

      - run: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Pod install
        working-directory: macos
        run: pod install

      - run: flutter build macos --release

      - name: Package .app as zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r prysm-macos.zip prysm.app

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-macos-build
          path: build/macos/Build/Products/Release/prysm-macos.zip

  # ----------------------
  # IOS BUILD
  # ----------------------
  build-ios:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install iOS dependencies
        run: |
          brew install cocoapods
          brew link --overwrite cocoapods

      - run: |
          flutter pub get

      - name: Pod install
        working-directory: ios
        run: pod install

      - run: flutter build ios --release --no-codesign

      - name: Package .app as zip
        run: |
          cd build/ios/iphoneos
          zip -r prysm-ios.zip Runner.app

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-ios-build
          path: build/ios/iphoneos/prysm-ios.zip

  # ----------------------
  # ANDROID BUILD
  # ----------------------
  build-android:
    needs: [authorize]
    if: needs.authorize.outputs.is_codeowner == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: pr-${{ env.PR_NUMBER }}-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk   