name: prysm_linux_audio
description: Linux PulseAudio/PipeWire input device enumeration for Prysm.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.9.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: PrysmLinuxAudioPlugin
